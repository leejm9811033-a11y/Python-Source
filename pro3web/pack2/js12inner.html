<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function func1(){
            // alert("a");
            // let str1 = document.getElementById("test1").innerHTML;
            let str1 = document.querySelector("#test1").innerHTML;  // css의 셀렉터를 사용하는걸 선호
            console.log(str1);
            document.querySelector("#show1").innerHTML =str1;
            // 서버 파일에서는 전혀 변화가 없고, 클라이언트 화면상에서만 변경된거다.
            // 클릭할 때, 왼쪽 위 화살표에 변화 유무를 보면 알 수 있다.

            let tag1 = "이름:<input type='text' name='irum'>";
            let tag2 = "나이:<input type='text' name='nai'>";
            document.querySelector("#test1").innerHTML = tag1 + "<br>" + tag2;
        }

        function func2(){
            // alert("b");
            let str2 = document.querySelector("#test2").innerHTML;  // css의 셀렉터를 사용하는걸 선호
            console.log(str2);
            document.querySelector("#show2").innerText =str2;
        }
    </script>
</head>
<body>
<!-- 
** 실행 중 tag의 생성, 삭제, 데이터의 참조, 추가, 수정, 삭제 처리 가능 명령 **
<br>
element.innerText : 이 속성은 element 안의 text 값들만 대상으로 처리
<br>
element.innerHTML : innerHTML 안의 텍스트 뿐 아니라 HTML이나 XML을 대상으로 처리
-->
<hr>
<div id="test1"><h2>innerHTML 연습</h2></div>
<div id="test2"><h2>안녕하세요</h2></div>
<input type="button" value="처리1" onclick="func1()">
<input type="button" value="처리2" onclick="func2()">
<br>
<div id="show1">출력 1</div>
<div id="show2">출력 2</div>
