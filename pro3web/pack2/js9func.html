<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 화살표 함수 -->>

    <!-- html와 자바가 혼선이 올 수 있어서 head에 함수를 놓는게 편하다. -->>
</head>
<body>

ES6부터는 화살표 함수(arrow function)라는 새로운 문법 방식으로 함수를 만들 수 있게 되었다
화살표 함수는 => 기호를 사용하여 function 키워드를 생략한다.<br>
함수 표현식 보다 단순한 문법으로 함수 처리가 가능해진다.<br>
형식 : let 변수 = (매개변수1, ...) => {표현식(표현식을 생략 가능)}
<br>
<!-- ECMA6: [JavaScript] 자주 사용하는 ES6 문법 정리 -->
<script>
    'use strict'; // 에크마6 이후 문법만 사용한다.

    function sum0(a, b){
        return a + b;
    }
    document.write(sum0(3, 4))

    let sum1 = function(a, b){
        return a + b;
    }
    document.write(sum1(3, 4))

    let sum2 = (a, b) => a + b          // 표현식에 중괄호를 빼자.
    document.write(sum2(3, 4))

    let sum3 = (a, b) => {return a + b} // 중괄호 사용하려면 return.
    document.write(sum3(3, 4))

    // let double1 = (n) => {return n * 2}; // 생략된게 이거다.
    let double1 = n => n * 2;
    document.write(`<br>결과는 ${double1(3)}`)

    let sayHi = ()  => document.write("<br>안녕하세요");
    sayHi();

    // let과 const는 완전히 다르다.
    // const age = 25; // 상수
    let age = 25;   // 변수

    let welcome = (age < 30)?()=>document.write("<br>welcome: 안녕"):document.write("<br>welcome: 반가워")
    welcome()
    let a = welcome()

    document.write("<br>");
    let sumFunc = (a, b) => {
        let result = a + b
        return result;
    }
    document.write(`두 수의 합은 ${sumFunc(5, 6)}`);

    // 자바스크립 이벤트 처리
    // https://sokkung.tistory.com/91


</script>
</body>
</html>
