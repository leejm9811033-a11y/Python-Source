<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- axios cdn -->>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
<!-- Axios는 브라우저와 Node.js 환경에서 서버와 HTTP 비동기 통신을 하기 위해 사용하는 인기 있는 Promise 기반 JavaScript 라이브러리입니다. -->
<!-- AJAX 처리할 때 Axios가 가장 편하다. -->>
<h3> AJAX 3가지 방식 비교</h3>

<button id="btn1">1) fetch then</button>
<button id="btn2">2) async fetch</button>
<button id="btn3">3) axios</button>

<hr>
<div id="result"></div>
<script>
    document.querySelector("#btn1").onclick = funcFetch;
    document.querySelector("#btn2").onclick = funcAsync;
    document.querySelector("#btn3").onclick = funcAxios;

// 1. fetch + then 방식
function funcFetch(){
    // alert("a");
    fetch("sangpum.json")
        .then(response => {
            if(!response.ok){   // promise 객체라는 것도 있다. 일단 이건 건너뛰기.
                throw new Error("서버 오류");
            }
            return response.json();
        })
        .then(data => {
            let output = "<b>fetch then 결과</b><br>";
            data.forEach(item => {
                output += "코드:" + item.code + " / 품명:" + item.sang + "<br>";
            })
            document.getElementById("result").innerHTML = output;
        })
        .catch(error => {
            document.getElementById("result").innerHTML = "에러 발생 : " + error;
        });
}

// 2. Async + await fetch 방식
async function funcAsync(){
    // alert("b");
    try{
        const response = await fetch("sangpum.json");
            
        if(!response.ok){   // promise 객체라는 것도 있다. 일단 이건 건너뛰기.
            throw new Error("서버 오류");
        }
        
        const data = await response.json();
        
        let output = "<b>async await 결과</b><br>";
        data.forEach(item => {
            output += "코드:" + item.code + " / 품명:" + item.sang + "<br>";
        });
        document.getElementById("result").innerHTML = output;
    }catch(error){
        document.getElementById("result").innerHTML = "에러발생 : " + error;
    }
}

// 3. Axios 방식
async function funcAxios(){
    // alert("c");
    try{
        const response = await axios.get("sangpum.json");
        const data = response.data;     // json 처리를 자동으로 해줌

        let output = "<b>axios 결과</b><br>";
        data.forEach(item => {
            output += "코드:" + item.code + " / 품명:" + item.sang + "<br>";
        });
        document.getElementById("result").innerHTML = output;
    }catch(error){
        document.getElementById("result").innerHTML = "에러발생 : " + error;
    } 
}
</script>
</body>
</html>
