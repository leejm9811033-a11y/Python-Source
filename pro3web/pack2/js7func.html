<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="text/javascript">
    function bb(){
        document.write(`bb 함수 실행 성공`);   <!-- 선언만 한 상태 --> 
        cc(5);  // 함수가 다른 함수 호출 가능
        // return; // 함수 무조건 탈출(아래 문장은 수행 안함) - 자기를 부른 곳으로 돌아감
        // 여기서 return하면 kk는 15만 출력. 함수의 무조건적인 탈출은 return이다.
        let re = cc(5);     // (반환값 처리)
        document.write(`<br>re는 ${re}`);

        // -- dd 함수 호출
        dd(7, 8);   
        dd(7, 8, 9);    // 세번째 인자는 무시
        dd(7);          // 7 undefined

        // js는 일급객체 지원 - python과 동일
        // 함수가 함수 호출 가능, 매개 변수 함수 전달 가능, 반환값 함수 가능

    }


    function cc(para){     // 매개변수가 있는 함수
        let kk = para + 10;
        document.write(`<br>kk는 ${kk}`); 
        return kk;      // 반환값은 1개만 가능
    }

    function dd(para1, para2){
        document.write(`<br>dd함수에서 ${para1} ${para2}`)
    }


    // 전역, 지역 변수
    let a = 100;        // 전역 변수
    const b = 200;      // 전역 상수

    function func(){
        let c = 300;    // 지역 변수
        const d = 400;  // 지역 상수
        document.write(`<br>a:${a} b:${b}`)
        document.write(`<br>a:${c} b:${d}`)
    }
    </script>

</head>
<body>
함수(function) : 어떤 특별한 목적의 작업을 수행하도록 설계된 독립적 블록{}을 의미
<br>
<script>
    // 내장함수 : js가 기본 지원
    let str = "Java script Language";
    document.write(`<br>str.charAt(2) : , ${str.charAt(2)}`); // str (index)2번째에 있는 알파벳
    document.write(`<br>str.bold() : , ${str.bold()}`); // str은 그냥 메시지

    document.write(`<br>Math.abs(-7) : , ${str.bold()}`);
</script>
<hr>
사용자 정의 함수<br>
<script>
    let count = 0;
    function aa(){  // 함수 선언    def aa():
        count += 1;     // let count면 지역변수, count면 전역변수
        document.write(count + "번 수행<br>");
    }

    aa();   // 함수 실행
    document.write("뭔가를 하다가...<br>");
    aa();   // 함수 실행
    document.write("함수는 참조형 타입 : ", typeof(aa));    // function 객체 참조형
    

    // 보일러플레이트
</script>
<div>div는 division 구역 분할</div> 
<script>
    aa();       // 자바스크립나오다 html 나오다 하면, 헷갈림. 
</script>

<hr>

<div><b>생각의 전환 : html 선언부에 js 코드(함수) 작성 후 함수 호출하기</b></div> 
익스터널 방식을 선호함 (인라인 방식 엘리먼트 안에 스타일을 주는거)
html에서 css, js를 사용하는걸걸 싫어함. 그러므로 인라인 방식을 사용지 마라.
위에 생각의전환을 좋아함.

자바랑 파이썬은 함수 중심 언어

<script>
    bb();

    
    document.write("<br>전역, 지역 변수 ---");
    func();
    document.write(`<br><br>a:${a} b:${b}`);

    // document.write(`<bc>c:${c} d:${d}`); // err
    // ReferenceError: c, d is not defined
</script>
</body>
</html>
